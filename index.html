<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>belajar buat formulir pendaftaran</title>
</head>
<body>
    <h1 align="center">Formulir Pendaftaran</h1>

    <form action="">
        <label for="nisn">NISN</label>
        <input type="text" name="nisn" placeholder="Masukan NISN">
        <br
        <label for="nama">Nama</label>
        <input type="text" name="nama" placeholder="Masukan Nama Lengkap">
        <br>
        <label for="alamat">Email</label>
        <input type="email" name="email" placeholder="Masukan Email">
        <br>
        <label for="password">Password</label>
        <input type="password" name="password" placeholder="Masukan Password">
        <br>
        <label for="Telepone">Telepone</label>
        <input type="text" name="Telepone" placeholder="Masukan masukan telepone">
        <br>
        <label for="alamat">Alamat</label>
        <textarea name="alamat" id="" rows="5" placeholder="Masukan Alamat"></textarea>
        <br>
        <label for="file">Upload Foto</label>
        <input type="file" name="foto" id="">
        <br>
        <label for="jenis_kelamin">Jenis Kelamin</label>
        <input type="radio" name="jenis" id="Laki-laki">
        <label for="Laki-laki">Laki-laki</label>
        <input type="radio" name="jenis" id="Perempuan">
        <label for="Perempuan">Perempuan</label>
        <br>
        <label for="jenis_kelamin">Jenis Kelamin</label>
        <select name="jenis" id="">
            <option value="">Pilih Jenis Kelamin</option>
            <option value="Laki-laki">Laki-laki</option>
            <option value="Perempuan">Perempuan</option>
            </select>
            <br>

    </form>
</body>
</html>
